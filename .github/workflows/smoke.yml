name: Smoke Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  smoke:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Start test server
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
      
      - name: Run UI smoke tests
        id: ui-tests
        run: npx playwright test --grep @smoke --project=${{ matrix.browser }}
        continue-on-error: false
      
      - name: Run API smoke tests
        id: api-tests
        run: npx playwright test tests/api/ --grep @smoke --project=${{ matrix.browser }}
        continue-on-error: false

      - name: Run accessibility tests
        id: a11y-tests
        run: npx playwright test tests/accessibility/ --project=${{ matrix.browser }}
        continue-on-error: true
      
      - name: Track test duration
        if: always()
        run: |
          echo "## ⏱️ Smoke Test Results - ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| UI Smoke | ${{ steps.ui-tests.outcome }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| API Smoke | ${{ steps.api-tests.outcome }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ${{ steps.a11y-tests.outcome }} | - |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total workflow duration: ${{ github.run_duration }} seconds" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
      
      - name: Upload duration metric
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duration-smoke-${{ matrix.browser }}-${{ github.run_id }}
          path: test-results/
          retention-days: 30