name: Performance Tests

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight
  workflow_dispatch:  # Manual trigger

jobs:
  performance:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Start test server
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
      
      - name: Run performance tests
        id: perf-tests
        run: npx playwright test tests/performance/ --grep @performance --project=${{ matrix.browser }}
        continue-on-error: true
      
      - name: Check for flaky tests
        if: always()
        run: |
          if [ -f "test-results/results.json" ]; then
            FLAKY_COUNT=$(grep -o '"retry":[1-9]' test-results/results.json | wc -l)
            echo "FLAKY_COUNT=$FLAKY_COUNT" >> $GITHUB_ENV
            echo "Flaky tests detected: $FLAKY_COUNT"
          fi
      
      - name: Generate flaky test report
        if: always()
        run: |
          echo "## ⚡ Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.perf-tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flaky tests detected | ${{ env.FLAKY_COUNT || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | ${{ matrix.browser }} |" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
      
      - name: Upload flaky test tracking
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-tracking-${{ matrix.browser }}
          path: test-results/results.json
          retention-days: 90