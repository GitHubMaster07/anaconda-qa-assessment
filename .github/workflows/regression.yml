name: Regression Tests

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  regression:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1/2, 2/2]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Run regression tests
        run: npx playwright test --grep @regression --project=${{ matrix.browser }} --shard=${{ matrix.shard }} --workers=2
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
      
      - name: Slack notification on failure
        if: failure() && github.event.schedule == '0 3 * * *'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Nightly regression failed on ${{ matrix.browser }}!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *Nightly Regression Failed*\nBrowser: ${{ matrix.browser }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}